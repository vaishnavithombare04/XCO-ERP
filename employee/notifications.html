<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - XtrazCon ERP Employee</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Shared Global CSS -->
    <link rel="stylesheet" href="../shared/global.css">
</head>
<body data-theme="light">
    <!-- App Header -->
    <header class="app-header">
        <div class="header-brand">
            <button class="btn btn-ghost btn-icon-only d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <span class="brand-title"><i class="bi bi-rocket-takeoff-fill text-primary"></i> XtrazCon IT ERP</span>
        </div>
        <div class="header-search d-none d-md-block">
            <i class="bi bi-search header-search-icon"></i>
            <input type="text" placeholder="Search notifications...">
        </div>
        <div class="header-actions">
            <button class="icon-btn theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="bi bi-sun sun-icon fs-5"></i>
                <i class="bi bi-moon moon-icon fs-5 d-none"></i>
            </button>
            <a href="notifications.html" class="icon-btn position-relative active" aria-label="Notifications">
                <i class="bi bi-bell fs-5"></i>
            </a>
            <div class="dropdown">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&h=80&q=80" alt="mdo" width="32" height="32" class="rounded-circle border">
                </a>
                <ul class="dropdown-menu dropdown-menu-end text-small shadow">
                    <li><a class="dropdown-item text-small fw-semibold" id="currentUserDisplay">Loading...</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../pages/login.html">Sign out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <nav class="sidebar-menu">
                <span class="sidebar-label">My Workspace</span>
                <a href="index.html" class="sidebar-item" id="nav-dashboard">
                    <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
                </a>
                <a href="tasks.html" class="sidebar-item" id="nav-tasks">
                    <i class="bi bi-kanban"></i> <span>My Tasks</span>
                </a>
                <a href="attendance.html" class="sidebar-item" id="nav-attendance">
                    <i class="bi bi-clock-history"></i> <span>Attendance</span>
                </a>
                <a href="leaves.html" class="sidebar-item" id="nav-leaves">
                    <i class="bi bi-calendar2-check"></i> <span>Leaves</span>
                </a>
                <a href="kpi.html" class="sidebar-item" id="nav-kpi">
                    <i class="bi bi-graph-up-arrow"></i> <span>KPI</span>
                </a>
                <a href="documents.html" class="sidebar-item" id="nav-documents">
                    <i class="bi bi-file-earmark-text"></i> <span>Documents</span>
                </a>
                <a href="profile.html" class="sidebar-item" id="nav-profile">
                    <i class="bi bi-person"></i> <span>Profile</span>
                </a>
                <a href="notifications.html" class="sidebar-item active" id="nav-notifications">
                    <i class="bi bi-bell"></i> <span>Notifications</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 font-weight-bold mb-0">My Notifications</h1>
                    <p class="text-muted font-13 mb-0">Stay updated on task updates and leave requests status changes.</p>
                </div>
            </div>

            <!-- Tabbed Controls -->
            <ul class="nav nav-pills" id="notifTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#all-notif" onclick="filterNotifs('all')">All Notifications</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tasks-notif" onclick="filterNotifs('tasks')">Tasks</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#leaves-notif" onclick="filterNotifs('leaves')">Leaves</button>
                </li>
            </ul>

            <!-- Notification Ledger Container -->
            <div class="card mt-3">
                <div class="card-body p-0">
                    <div class="d-flex flex-column" id="notificationsList">
                        <!-- Dynamic notification rows -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Global Logic -->
    <script src="../shared/global.js"></script>
    <script>
        const role = 'Employee';
        const userId = 'EMP006'; // Raj Patel
        let currentFilter = 'all';

        function renderNotifications() {
            const data = getScopedData('notifications', role, userId);
            const container = document.getElementById('notificationsList');

            const filteredData = data.filter(n => {
                if (currentFilter === 'all') return true;
                return n.type === currentFilter;
            });

            container.innerHTML = filteredData.map(n => {
                let iconClass = 'bi-bell-fill text-primary';
                if (n.type === 'tasks') iconClass = 'bi-kanban text-info';
                if (n.type === 'attendance') iconClass = 'bi-clock-history text-success';
                if (n.type === 'leaves') iconClass = 'bi-calendar-check text-warning';

                return `
                    <div class="d-flex align-items-center justify-content-between p-3 border-bottom hover-bg">
                        <div class="d-flex align-items-center gap-3">
                            <div class="bg-light rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                                <i class="bi ${iconClass} fs-5"></i>
                            </div>
                            <div>
                                <p class="mb-0 font-13 font-weight-500">${n.message}</p>
                                <span class="font-10 text-muted">${n.time}</span>
                            </div>
                        </div>
                        <button class="btn btn-ghost btn-xs text-muted" onclick="dismissNotification('${n.id}')">Dismiss</button>
                    </div>
                `;
            }).join('') || `<div class="text-center py-5 text-muted font-12"><i class="bi bi-bell-slash fs-2 d-block mb-2"></i>No notifications.</div>`;
        }

        window.filterNotifs = (tab) => {
            currentFilter = tab;
            renderNotifications();
        };

        window.dismissNotification = (id) => {
            mockDB.notifications = mockDB.notifications.filter(n => n.id !== id);
            saveMockDB();
            showToast("Notification dismissed.", "success");
            renderNotifications();
        };

        document.addEventListener('DOMContentLoaded', () => {
            const user = mockDB.users.find(u => u.id === userId);
            if (user) {
                document.getElementById('currentUserDisplay').innerText = `${user.name} (${role})`;
            }
            renderNotifications();
        });
    </script>
</body>
</html>
