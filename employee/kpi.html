<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My KPIs - XtrazCon ERP Employee</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Chart.js UMD -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <!-- Shared Global CSS -->
    <link rel="stylesheet" href="../shared/global.css">
</head>
<body data-theme="light">
    <!-- App Header -->
    <header class="app-header">
        <div class="header-brand">
            <button class="btn btn-ghost btn-icon-only d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <span class="brand-title"><i class="bi bi-rocket-takeoff-fill text-primary"></i> XtrazCon IT ERP</span>
        </div>
        <div class="header-search d-none d-md-block">
            <i class="bi bi-search header-search-icon"></i>
            <input type="text" placeholder="Search my KPIs...">
        </div>
        <div class="header-actions">
            <button class="icon-btn theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="bi bi-sun sun-icon fs-5"></i>
                <i class="bi bi-moon moon-icon fs-5 d-none"></i>
            </button>
            <a href="notifications.html" class="icon-btn position-relative" aria-label="Notifications">
                <i class="bi bi-bell fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
            </a>
            <div class="dropdown">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&h=80&q=80" alt="mdo" width="32" height="32" class="rounded-circle border">
                </a>
                <ul class="dropdown-menu dropdown-menu-end text-small shadow">
                    <li><a class="dropdown-item text-small fw-semibold" id="currentUserDisplay">Loading...</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../pages/login.html">Sign out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <nav class="sidebar-menu">
                <span class="sidebar-label">My Workspace</span>
                <a href="index.html" class="sidebar-item" id="nav-dashboard">
                    <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
                </a>
                <a href="tasks.html" class="sidebar-item" id="nav-tasks">
                    <i class="bi bi-kanban"></i> <span>My Tasks</span>
                </a>
                <a href="attendance.html" class="sidebar-item" id="nav-attendance">
                    <i class="bi bi-clock-history"></i> <span>Attendance</span>
                </a>
                <a href="leaves.html" class="sidebar-item" id="nav-leaves">
                    <i class="bi bi-calendar2-check"></i> <span>Leaves</span>
                </a>
                <a href="kpi.html" class="sidebar-item active" id="nav-kpi">
                    <i class="bi bi-graph-up-arrow"></i> <span>KPI</span>
                </a>
                <a href="documents.html" class="sidebar-item" id="nav-documents">
                    <i class="bi bi-file-earmark-text"></i> <span>Documents</span>
                </a>
                <a href="profile.html" class="sidebar-item" id="nav-profile">
                    <i class="bi bi-person"></i> <span>Profile</span>
                </a>
                <a href="notifications.html" class="sidebar-item" id="nav-notifications">
                    <i class="bi bi-bell"></i> <span>Notifications</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 font-weight-bold mb-0">My Key Performance Indicators</h1>
                    <p class="text-muted font-13 mb-0">Read-only performance parameters and historical benchmark comparisons.</p>
                </div>
            </div>

            <!-- KPI Cards -->
            <div class="row g-4" id="kpiProgressCards">
                <!-- Dynamic progress cards -->
            </div>

            <!-- Trend Chart Card -->
            <div class="card mt-4">
                <div class="card-body">
                    <h5 class="card-title mb-4">My Monthly Performance Benchmark Trend</h5>
                    <div class="chart-container-300">
                        <canvas id="kpiTrendChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Global Logic -->
    <script src="../shared/global.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = 'Employee';
            const userId = 'EMP006'; // Raj Patel

            const user = mockDB.users.find(u => u.id === userId);
            if (user) {
                document.getElementById('currentUserDisplay').innerText = `${user.name} (${role})`;
            }

            const scopedKpis = getScopedData('kpi', role, userId);
            const container = document.getElementById('kpiProgressCards');

            // Render cards
            if (scopedKpis.length > 0) {
                container.innerHTML = scopedKpis.map(k => `
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <h6 class="font-weight-bold text-primary mb-2">${k.name}</h6>
                                <div class="text-secondary font-12 mb-3">Department Target: <strong>${k.target}</strong> (Weightage: ${k.weightage})</div>
                                <div class="d-flex justify-content-between align-items-center mb-1 font-11">
                                    <span>Target Completion</span>
                                    <strong>Progress: ${k.progress}%</strong>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-success" role="progressbar" style="width: ${k.progress}%;" aria-valuenow="${k.progress}" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div class="col-12 text-center text-muted py-4">No KPIs assigned for your profile.</div>`;
            }

            // Render Chart
            new Chart(document.getElementById('kpiTrendChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['March', 'April', 'May', 'June', 'July'],
                    datasets: [{
                        label: 'My Average Score (%)',
                        data: [75, 82, 80, 88, scopedKpis.length ? Math.round(scopedKpis.reduce((acc, c) => acc + c.progress, 0) / scopedKpis.length) : 75],
                        borderColor: '#3b82f6',
                        tension: 0.1,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });
        });
    </script>
</body>
</html>
