<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - XtrazCon ERP Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Shared Global CSS -->
    <link rel="stylesheet" href="../shared/global.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-app);
            padding: 20px;
        }
        .auth-card {
            max-width: 420px;
            width: 100%;
            padding: 32px;
            border-radius: var(--radius-lg);
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: 12px;
                padding-top: 60px;
            }
            .auth-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body data-theme="light">
    <div class="auth-container">
        <!-- Floating Theme Toggle -->
        <div class="position-absolute top-0 end-0 m-3">
            <button class="icon-btn theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="bi bi-sun sun-icon fs-5"></i>
                <i class="bi bi-moon moon-icon fs-5 d-none"></i>
            </button>
        </div>

        <div class="auth-card text-start">
            <div class="text-center mb-4">
                <h2 class="h4 font-weight-bold mb-1"><i class="bi bi-rocket-takeoff-fill text-primary"></i> XtrazCon IT ERP</h2>
                <p class="text-muted font-12">Sign in to your administrative dashboard</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label font-12 font-weight-600">Email address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@xtrazcon.com" required value="sarah.c@xtrazcon.com">
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label font-12 font-weight-600 mb-0">Password</label>
                        <a href="forgot-password.html" class="font-11 text-primary text-decoration-none">Forgot password?</a>
                    </div>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required value="admin123">
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                    <label class="form-check-label font-12 text-secondary" for="rememberMe">
                        Keep me signed in
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3 py-2">Sign In</button>
            </form>

            <div class="text-center font-12 text-secondary">
                Don't have an account? <a href="signup.html" class="text-primary text-decoration-none font-weight-600">Request access / Sign up</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Global Logic -->
    <script src="../shared/global.js"></script>
    <script>
        // Override event object parameter for inline handlers safety
        function handleLogin(event) {
            if (event) event.preventDefault();
            
            const form = document.getElementById('loginForm');
            const rules = {
                email: { required: true, email: true },
                password: { required: true }
            };

            if (!validateForm('#loginForm', rules)) return;

            const formData = new FormData(form);
            const email = formData.get('email');
            const password = formData.get('password');

            // Find user in mock database
            const user = mockDB.users.find(u => u.email.toLowerCase() === email.toLowerCase());

            if (user) {
                // Pre-seeded credentials validation (in a prototype environment, any password works for valid users)
                showToast(`Welcome back, ${user.name}!`, "success");
                logAudit(user.name, "Authentication", "Login", "Successfully signed into ERP console");
                
                setTimeout(() => {
                    window.location.href = "../admin/index.html";
                }, 1000);


            } else {
                showToast("Invalid administrative credentials!", "error");
            }
        }

        // Bind form submit handler programmatically
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
