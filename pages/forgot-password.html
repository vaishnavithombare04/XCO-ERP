<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - XtrazCon ERP</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Shared Global CSS -->
    <link rel="stylesheet" href="../shared/global.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-app);
            padding: 20px;
        }
        .auth-card {
            max-width: 420px;
            width: 100%;
            padding: 32px;
            border-radius: var(--radius-lg);
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: 12px;
                padding-top: 60px;
            }
            .auth-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body data-theme="light">
    <div class="auth-container">
        <!-- Floating Theme Toggle -->
        <div class="position-absolute top-0 end-0 m-3">
            <button class="icon-btn theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="bi bi-sun sun-icon fs-5"></i>
                <i class="bi bi-moon moon-icon fs-5 d-none"></i>
            </button>
        </div>

        <div class="auth-card text-start">
            <div class="text-center mb-4">
                <h2 class="h4 font-weight-bold mb-1"><i class="bi bi-rocket-takeoff-fill text-primary"></i> XtrazCon IT ERP</h2>
                <p class="text-muted font-12">Reset your account password</p>
            </div>

            <form id="forgotPasswordForm" onsubmit="handleResetRequest(event)">
                <div class="mb-3">
                    <label class="form-label font-12 font-weight-600">Email address</label>
                    <input type="email" name="email" id="resetEmail" class="form-control" placeholder="name@company.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-sm py-2 font-weight-600 mb-3">Send Reset Link</button>
                
                <div class="text-center">
                    <a href="login.html" class="font-11 text-primary text-decoration-none"><i class="bi bi-arrow-left"></i> Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Global Logic -->
    <script src="../shared/global.js"></script>
    <script>
        window.handleResetRequest = (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();
            if (email) {
                showToast(`Password reset link sent to ${email}!`, "success");
                document.getElementById('forgotPasswordForm').reset();
            }
        };
    </script>
</body>
</html>
