<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI & Performance - XtrazCon ERP Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Chart.js UMD -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <!-- Shared Global CSS -->
    <link rel="stylesheet" href="../shared/global.css">
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-brand">
            <button class="btn btn-ghost btn-icon-only d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <span class="brand-title"><i class="bi bi-rocket-takeoff-fill text-primary"></i> XtrazCon IT ERP</span>
        </div>
        <div class="header-search d-none d-md-block">
            <i class="bi bi-search header-search-icon"></i>
            <input type="text" placeholder="Search KPIs...">
        </div>
        <div class="header-actions">
            <button class="icon-btn theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="bi bi-sun sun-icon fs-5"></i>
                <i class="bi bi-moon moon-icon fs-5 d-none"></i>
            </button>
            <a href="notifications.html" class="icon-btn position-relative" aria-label="Notifications">
                <i class="bi bi-bell fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
            </a>
            <div class="dropdown">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&h=80&q=80" alt="mdo" width="32" height="32" class="rounded-circle border">
                </a>
                <ul class="dropdown-menu dropdown-menu-end text-small shadow">
                    <li><a class="dropdown-item text-small fw-semibold" id="currentUserDisplay">Loading...</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../pages/login.html">Sign out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <nav class="sidebar-menu">
                <span class="sidebar-label">Manager Workspace</span>
                <a href="index.html" class="sidebar-item" id="nav-dashboard">
                    <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
                </a>
                <a href="team-overview.html" class="sidebar-item" id="nav-team-overview">
                    <i class="bi bi-people"></i> <span>Team Overview</span>
                </a>
                <a href="tasks.html" class="sidebar-item" id="nav-tasks">
                    <i class="bi bi-kanban"></i> <span>Tasks</span>
                </a>
                <a href="crm-leads.html" class="sidebar-item" id="nav-leads">
                    <i class="bi bi-funnel"></i> <span>Leads</span>
                </a>
                <a href="attendance.html" class="sidebar-item" id="nav-attendance">
                    <i class="bi bi-clock-history"></i> <span>Attendance</span>
                </a>
                <a href="leaves.html" class="sidebar-item" id="nav-leaves">
                    <i class="bi bi-calendar2-check"></i> <span>Leaves</span>
                </a>
                <a href="approvals.html" class="sidebar-item" id="nav-approvals">
                    <i class="bi bi-check2-square"></i> <span>Approvals</span>
                </a>
                <a href="kpi.html" class="sidebar-item active" id="nav-kpi">
                    <i class="bi bi-graph-up-arrow"></i> <span>KPI</span>
                </a>
                <a href="reports.html" class="sidebar-item" id="nav-reports">
                    <i class="bi bi-file-earmark-bar-graph"></i> <span>Reports</span>
                </a>
                <a href="notifications.html" class="sidebar-item" id="nav-notifications">
                    <i class="bi bi-bell"></i> <span>Notifications</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 font-weight-bold mb-0">KPI & Performance</h1>
                    <p class="text-muted font-13 mb-0">Evaluate team productivity metrics and completion ratios.</p>
                </div>
            </div>

            <!-- KPI Cards Row -->
            <div class="row g-4" id="kpiProgressCards">
                <!-- Dynamically populated progress-bar cards per member -->
            </div>

            <!-- Comparison Chart Card -->
            <div class="card mt-4">
                <div class="card-body">
                    <h5 class="card-title mb-4">Member Performance Benchmark Comparison</h5>
                    <div style="min-height: 300px; position: relative;">
                        <canvas id="kpiComparisonChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Global Logic -->
    <script src="../shared/global.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('currentRole') || 'Manager';
            const userId = localStorage.getItem('currentUserId') || 'EMP002';

            const user = mockDB.users.find(u => u.id === userId);
            if (user) {
                document.getElementById('currentUserDisplay').innerText = `${user.name} (${role})`;
            }

            const scopedUsers = getScopedData('users', role, userId);
            const scopedKpis = getScopedData('kpi', role, userId);

            // Populate cards
            const cardsContainer = document.getElementById('kpiProgressCards');
            
            cardsContainer.innerHTML = scopedUsers.map(u => {
                // Find matching KPI in mockDB, or generate default completion based on tasks completed
                const k = scopedKpis.find(item => item.employee === u.name) || {
                    name: 'Task Completion Velocity',
                    progress: 75,
                    target: '90%'
                };

                return `
                    <div class="col-md-6 col-lg-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="mb-0 font-weight-bold">${u.name}</h6>
                                    <span class="badge bg-light text-primary border font-10">${u.role}</span>
                                </div>
                                <div class="text-secondary font-12 mb-3">Metric: <strong>${k.name}</strong></div>
                                <div class="d-flex justify-content-between align-items-center mb-1 font-11">
                                    <span>Target Completion: ${k.target}</span>
                                    <strong>Progress: ${k.progress}%</strong>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-success" role="progressbar" style="width: ${k.progress}%;" aria-valuenow="${k.progress}" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Chart comparisons
            const memberNames = scopedUsers.map(u => u.name);
            const performanceValues = scopedUsers.map(u => {
                const k = scopedKpis.find(item => item.employee === u.name);
                return k ? k.progress : 75;
            });

            new Chart(document.getElementById('kpiComparisonChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: memberNames,
                    datasets: [{
                        label: 'Performance Score (%)',
                        data: performanceValues,
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) { return value + "%"; }
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
