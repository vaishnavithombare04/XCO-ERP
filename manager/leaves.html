<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaves - XtrazCon ERP Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Shared Global CSS -->
    <link rel="stylesheet" href="../shared/global.css">
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-brand">
            <button class="btn btn-ghost btn-icon-only d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <span class="brand-title"><i class="bi bi-rocket-takeoff-fill text-primary"></i> XtrazCon IT ERP</span>
        </div>
        <div class="header-search d-none d-md-block">
            <i class="bi bi-search header-search-icon"></i>
            <input type="text" placeholder="Search leaves...">
        </div>
        <div class="header-actions">
            <button class="icon-btn theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="bi bi-sun sun-icon fs-5"></i>
                <i class="bi bi-moon moon-icon fs-5 d-none"></i>
            </button>
            <a href="notifications.html" class="icon-btn position-relative" aria-label="Notifications">
                <i class="bi bi-bell fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
            </a>
            <div class="dropdown">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&h=80&q=80" alt="mdo" width="32" height="32" class="rounded-circle border">
                </a>
                <ul class="dropdown-menu dropdown-menu-end text-small shadow">
                    <li><a class="dropdown-item text-small fw-semibold" id="currentUserDisplay">Loading...</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../pages/login.html">Sign out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <nav class="sidebar-menu">
                <span class="sidebar-label">Manager Workspace</span>
                <a href="index.html" class="sidebar-item" id="nav-dashboard">
                    <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
                </a>
                <a href="team-overview.html" class="sidebar-item" id="nav-team-overview">
                    <i class="bi bi-people"></i> <span>Team Overview</span>
                </a>
                <a href="tasks.html" class="sidebar-item" id="nav-tasks">
                    <i class="bi bi-kanban"></i> <span>Tasks</span>
                </a>
                <a href="crm-leads.html" class="sidebar-item" id="nav-leads">
                    <i class="bi bi-funnel"></i> <span>Leads</span>
                </a>
                <a href="attendance.html" class="sidebar-item" id="nav-attendance">
                    <i class="bi bi-clock-history"></i> <span>Attendance</span>
                </a>
                <a href="leaves.html" class="sidebar-item active" id="nav-leaves">
                    <i class="bi bi-calendar2-check"></i> <span>Leaves</span>
                </a>
                <a href="approvals.html" class="sidebar-item" id="nav-approvals">
                    <i class="bi bi-check2-square"></i> <span>Approvals</span>
                </a>
                <a href="kpi.html" class="sidebar-item" id="nav-kpi">
                    <i class="bi bi-graph-up-arrow"></i> <span>KPI</span>
                </a>
                <a href="reports.html" class="sidebar-item" id="nav-reports">
                    <i class="bi bi-file-earmark-bar-graph"></i> <span>Reports</span>
                </a>
                <a href="notifications.html" class="sidebar-item" id="nav-notifications">
                    <i class="bi bi-bell"></i> <span>Notifications</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 font-weight-bold mb-0">Leaves Ledger</h1>
                    <p class="text-muted font-13 mb-0">Overview leave schedules and process team applications.</p>
                </div>
            </div>

            <!-- Ledger Card -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title mb-3">Leave Applications</h5>
                    <div class="data-table-container">
                        <table class="data-table" id="leavesTable">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Leave Type</th>
                                    <th>From</th>
                                    <th>To</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="leavesListBody">
                                <!-- Dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Global Logic -->
    <script src="../shared/global.js"></script>
    <script>
        const role = localStorage.getItem('currentRole') || 'Manager';
        const userId = localStorage.getItem('currentUserId') || 'EMP002';
        const isApproveAllowed = canApprove('leaves', role);

        function renderLeaves() {
            const data = getScopedData('leaves', role, userId);
            const tbody = document.getElementById('leavesListBody');

            tbody.innerHTML = data.map(l => {
                let badgeClass = 'bg-warning text-dark';
                if (l.status === 'Approved') badgeClass = 'bg-success text-white';
                if (l.status === 'Rejected') badgeClass = 'bg-danger text-white';
                if (l.status === 'Forwarded to Manager') badgeClass = 'bg-info text-white';

                let actionHTML = '';
                if (l.status === 'Pending') {
                    if (isApproveAllowed) {
                        actionHTML = `
                            <button class="btn btn-success btn-xs" onclick="approveLeave('${l.id}')">Approve</button>
                            <button class="btn btn-danger btn-xs" onclick="rejectLeave('${l.id}')">Reject</button>
                        `;
                    } else {
                        // Forward action for TL/Coordinator
                        actionHTML = `
                            <button class="btn btn-primary btn-xs" onclick="forwardLeave('${l.id}')">Forward to Manager</button>
                        `;
                    }
                } else if (l.status === 'Forwarded to Manager' && !isApproveAllowed) {
                    actionHTML = `<button class="btn btn-secondary btn-xs" disabled title="Already forwarded to Manager">Forwarded</button>`;
                } else if (l.status === 'Forwarded to Manager' && isApproveAllowed) {
                    actionHTML = `
                        <button class="btn btn-success btn-xs" onclick="approveLeave('${l.id}')">Approve</button>
                        <button class="btn btn-danger btn-xs" onclick="rejectLeave('${l.id}')">Reject</button>
                    `;
                } else {
                    actionHTML = `<span class="text-muted font-11">No actions pending</span>`;
                }

                return `
                    <tr>
                        <td><strong>${l.employee}</strong></td>
                        <td>${l.type}</td>
                        <td>${l.start}</td>
                        <td>${l.end}</td>
                        <td>${l.reason}</td>
                        <td><span class="status-badge ${badgeClass}">${l.status}</span></td>
                        <td>
                            <div class="d-flex gap-1">
                                ${actionHTML}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.approveLeave = (id) => {
            const leave = mockDB.leaves.find(l => l.id === id);
            if (leave) {
                leave.status = 'Approved';
                saveMockDB();
                logAudit(mockDB.users.find(u => u.id === userId).name, "Leaves", "Approve", `Approved leave request for ${leave.employee}`);
                showToast("Leave request approved!", "success");
                renderLeaves();
            }
        };

        window.rejectLeave = (id) => {
            const leave = mockDB.leaves.find(l => l.id === id);
            if (leave) {
                leave.status = 'Rejected';
                saveMockDB();
                logAudit(mockDB.users.find(u => u.id === userId).name, "Leaves", "Reject", `Rejected leave request for ${leave.employee}`);
                showToast("Leave request rejected.", "error");
                renderLeaves();
            }
        };

        window.forwardLeave = (id) => {
            const leave = mockDB.leaves.find(l => l.id === id);
            if (leave) {
                leave.status = 'Forwarded to Manager';
                saveMockDB();
                logAudit(mockDB.users.find(u => u.id === userId).name, "Leaves", "Forward", `Forwarded leave request of ${leave.employee} to Department Manager`);
                showToast("Leave request forwarded to Manager.", "success");
                renderLeaves();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const user = mockDB.users.find(u => u.id === userId);
            if (user) {
                document.getElementById('currentUserDisplay').innerText = `${user.name} (${role})`;
            }
            renderLeaves();
            initDataTable('#leavesTable');
        });
    </script>
</body>
</html>
